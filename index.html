<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🐾 Appel des Chiots</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --night: #0c1220;
  --card: #151f33;
  --card2: #1a2740;
  --accent: #fbbf24;
  --red: #f43f5e;
  --text: #e2eaf8;
  --sub: #7a90b8;
  --radius: 22px;
  --call-color: #0ea5e9;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--night);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, #1a3a6a44 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 85% 85%, #0ea5e912 0%, transparent 60%);
}
.bg::after {
  content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, #fff9 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 12%, #fff7 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 45%, #fff6 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 68%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 8%  82%, #fff7 0%, transparent 100%),
    radial-gradient(1px 1px at 92% 22%, #fff8 0%, transparent 100%),
    radial-gradient(1px 1px at 62% 58%, #fff5 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 92%, #fff4 0%, transparent 100%);
}
.screen { display:none; flex-direction:column; height:100vh; position:relative; z-index:1; }
.screen.active { display:flex; animation: slideUp .3s ease both; }
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ---- SELECT ---- */
#screen-select { overflow-y:auto; padding-bottom:30px; }
.header { text-align:center; padding:36px 20px 16px; }
.header h1 {
  font-family:'Baloo 2',cursive; font-size:2.1rem; font-weight:900;
  color:var(--accent); text-shadow:0 2px 24px #fbbf2450; letter-spacing:-0.5px;
}
.header p { color:var(--sub); font-size:.9rem; margin-top:5px; }

.dogs-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:8px 18px; }

.dog-card {
  background:var(--card); border-radius:var(--radius);
  padding:22px 12px 16px; display:flex; flex-direction:column;
  align-items:center; gap:7px; cursor:pointer;
  border:2px solid transparent;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden;
  box-shadow:0 4px 20px #00000055;
}
.dog-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,#ffffff07 0%,transparent 60%);
  pointer-events:none;
}
.dog-card:hover, .dog-card:active {
  transform:translateY(-3px) scale(1.03);
  border-color:var(--c);
  box-shadow:0 8px 28px color-mix(in srgb,var(--c) 30%,transparent), 0 0 0 1px color-mix(in srgb,var(--c) 25%,transparent);
}
.dog-emoji { font-size:3rem; line-height:1; transition:transform .3s cubic-bezier(.34,1.56,.64,1); filter:drop-shadow(0 3px 8px #0007); }
.dog-card:hover .dog-emoji { transform:scale(1.18) rotate(-7deg); }
.dog-name { font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; }
.dog-role {
  font-size:.72rem; font-weight:800; color:var(--c,var(--sub));
  text-transform:uppercase; letter-spacing:.07em;
  background:color-mix(in srgb,var(--c,var(--sub)) 18%,transparent);
  padding:2px 10px; border-radius:100px;
}
.call-pill {
  margin-top:3px; padding:6px 16px; border-radius:100px; border:none;
  background:var(--c); color:white; font-size:.82rem; font-weight:800;
  cursor:pointer; letter-spacing:.04em;
  box-shadow:0 3px 12px color-mix(in srgb,var(--c) 45%,transparent);
  transition:transform .15s;
}
.call-pill:active { transform:scale(.93); }

/* ---- CALL ---- */
#screen-call { background:linear-gradient(180deg,#0c1220 0%,#0d1828 100%); }

.call-header {
  padding:18px 18px 12px; display:flex; align-items:center; gap:13px;
  border-bottom:1px solid #ffffff0d;
  background:linear-gradient(180deg,#0f182baa,transparent);
}
.dog-av {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:1.9rem;
  background:var(--card2);
  border:2.5px solid var(--call-color);
  box-shadow:0 0 16px color-mix(in srgb,var(--call-color) 35%,transparent);
  position:relative;
}
.dot {
  position:absolute; bottom:1px; right:1px;
  width:11px; height:11px; background:#22c55e;
  border-radius:50%; border:2px solid var(--night);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100%{box-shadow:0 0 0 0 #22c55e44;}
  50%{box-shadow:0 0 0 5px #22c55e00;}
}
.cinfo { flex:1; }
.cinfo .cname { font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800; }
.cinfo .crole { font-size:.75rem; color:var(--call-color); font-weight:700; }
.ctimer { font-size:.78rem; color:var(--sub); font-variant-numeric:tabular-nums; font-weight:700; }

#chatArea {
  flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:9px;
  scroll-behavior:smooth;
}
#chatArea::-webkit-scrollbar { width:3px; }
#chatArea::-webkit-scrollbar-thumb { background:#ffffff10; border-radius:99px; }

.bubble {
  max-width:78%; padding:10px 14px; border-radius:18px;
  font-size:.93rem; line-height:1.45;
  animation:pop .22s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop {
  from{opacity:0;transform:scale(.82) translateY(6px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.bubble-dog { background:var(--card2); align-self:flex-start; border-bottom-left-radius:5px; border:1px solid #ffffff0d; }
.bubble-user {
  background:linear-gradient(135deg,var(--call-color),color-mix(in srgb,var(--call-color) 65%,#7c3aed));
  align-self:flex-end; border-bottom-right-radius:5px; color:#fff;
}
.bubble-typing { background:var(--card2); align-self:flex-start; border-bottom-left-radius:5px; padding:12px 16px; border:1px solid #ffffff0d; }
.dots { display:flex; gap:4px; align-items:center; }
.dots span { width:7px; height:7px; border-radius:50%; background:var(--sub); animation:bd .85s infinite; }
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}
@keyframes bd { 0%,80%,100%{transform:translateY(0);opacity:.45;} 40%{transform:translateY(-6px);opacity:1;} }

.call-controls {
  padding:12px 20px 26px; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
#micBtn {
  width:70px; height:70px; border-radius:50%; border:2.5px solid #ffffff15;
  background:var(--card); color:var(--text); font-size:1.55rem;
  cursor:pointer; box-shadow:0 4px 18px #0008;
  transition:all .2s cubic-bezier(.34,1.56,.64,1); touch-action:none; user-select:none;
}
#micBtn.recording {
  background:var(--red); border-color:var(--red);
  animation:pm .75s infinite;
}
@keyframes pm {
  0%,100%{box-shadow:0 0 0 5px #f43f5e1a,0 4px 18px #f43f5e44;}
  50%{box-shadow:0 0 0 13px #f43f5e08,0 4px 18px #f43f5e44;}
}
#hangupBtn {
  width:54px; height:54px; border-radius:50%; background:var(--red); border:none;
  font-size:1.3rem; cursor:pointer; box-shadow:0 4px 16px #f43f5e44;
  transition:transform .15s;
}
#hangupBtn:active{transform:scale(.88);}
.mstatus { font-size:.75rem; color:var(--sub); text-align:center; font-weight:700; min-width:70px; line-height:1.4; }
.mstatus.on { color:var(--red); }
</style>
</head>
<body>
<div class="bg"></div>

<!-- SÉLECTION -->
<div class="screen active" id="screen-select">
  <div class="header">
    <h1>🐾 Appel des Chiots</h1>
    <p>Choisis un chiot pour lui téléphoner !</p>
  </div>
  <div class="dogs-grid" id="dogGrid"></div>
</div>

<!-- APPEL -->
<div class="screen" id="screen-call">
  <div class="call-header">
    <div class="dog-av" id="callAv"><span id="callEmoji">🐕</span><div class="dot"></div></div>
    <div class="cinfo">
      <div class="cname" id="callName">Chase</div>
      <div class="crole" id="callRole">Policier</div>
    </div>
    <div class="ctimer" id="callTimer">00:00</div>
  </div>

  <div id="chatArea"></div>

  <div class="call-controls">
    <div class="mstatus" id="mstatus">Maintiens<br>pour parler</div>
    <button id="micBtn">🎙️</button>
    <button id="hangupBtn">📵</button>
  </div>
</div>

<script>
const DOGS = [
  { id:'chase',   name:'Chase',   emoji:'🐕', role:'Policier',   color:'#3b82f6',
    pitch:1.85, rate:1.15,
    persona:`Tu es Chase, le chien policier de la Pat' Patrouille. Courageux et loyal. Tu parles en français, tu dis "Wouf !" parfois. Réponses très courtes : 1-2 phrases max. Pas de liste, juste de la conversation naturelle.` },
  { id:'stella',  name:'Stella',  emoji:'🦮', role:'Recyclage',  color:'#10b981',
    pitch:2.05, rate:1.1,
    persona:`Tu es Stella, la dalmatienne spécialiste du recyclage. Joyeuse et écolo. Tu dis "Ouaf !" parfois. Réponses très courtes : 1-2 phrases max. Conversation naturelle en français.` },
  { id:'rocky',   name:'Rocky',   emoji:'🐶', role:'Mécano',     color:'#f59e0b',
    pitch:1.75, rate:1.2,
    persona:`Tu es Rocky, le teckel mécano de la Pat' Patrouille. Tu adores bricoler. Tu dis "Wouf !" et "Ne gâche pas, récupère !" parfois. Réponses très courtes : 1-2 phrases max en français.` },
  { id:'zuma',    name:'Zuma',    emoji:'🌊', role:'Aquatique',  color:'#06b6d4',
    pitch:1.9,  rate:1.25,
    persona:`Tu es Zuma, le labrador sauveteur aquatique. Tu adores l'eau et le surf. Tu dis "Rip rip wouf !" parfois. Réponses très courtes : 1-2 phrases max en français.` },
  { id:'everest', name:'Everest', emoji:'🐺', role:'Montagne',   color:'#8b5cf6',
    pitch:1.95, rate:1.1,
    persona:`Tu es Everest le husky de la montagne et de la neige. Tu adores le ski. Tu parles en français avec des "Wouf glacé !". Réponses très courtes : 1-2 phrases max.` },
  { id:'ruben',   name:'Ruben',   emoji:'🐩', role:'Pompier',    color:'#f97316',
    pitch:1.8,  rate:1.15,
    persona:`Tu es Ruben, le dalmatien pompier de la Pat' Patrouille. Brave et fort. Tu parles en français avec des "Wouf courageux !". Réponses très courtes : 1-2 phrases max.` }
];

let dog = null, recog = null, isRec = false, isTalking = false;
let timerSec = 0, timerIv = null;
let history = [];
const synth = window.speechSynthesis;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;

// Build grid
DOGS.forEach(d => {
  const c = document.createElement('div');
  c.className = 'dog-card';
  c.style.cssText = `--c:${d.color}`;
  c.innerHTML = `
    <div class="dog-emoji">${d.emoji}</div>
    <div class="dog-name">${d.name}</div>
    <div class="dog-role" style="--c:${d.color}">${d.role}</div>
    <button class="call-pill" style="background:${d.color};box-shadow:0 3px 12px color-mix(in srgb,${d.color} 45%,transparent)">📞 Appeler</button>
  `;
  c.onclick = () => startCall(d.id);
  document.getElementById('dogGrid').appendChild(c);
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startCall(id) {
  dog = DOGS.find(d => d.id === id);
  history = [];
  document.getElementById('callEmoji').textContent = dog.emoji;
  document.getElementById('callAv').style.setProperty('--call-color', dog.color);
  document.getElementById('callName').textContent = dog.name;
  document.getElementById('callRole').textContent = dog.role;
  document.documentElement.style.setProperty('--call-color', dog.color);
  document.getElementById('chatArea').innerHTML = '';
  timerSec = 0;
  clearInterval(timerIv);
  timerIv = setInterval(() => {
    timerSec++;
    const m = String(Math.floor(timerSec/60)).padStart(2,'0');
    const s = String(timerSec%60).padStart(2,'0');
    document.getElementById('callTimer').textContent = `${m}:${s}`;
  }, 1000);
  showScreen('screen-call');
  setTimeout(() => {
    const g = `Wouf ! Allo ? C'est toi ! 🐾`;
    bubble(g,'dog');
    speak(g);
    history.push({role:'assistant',content:g});
  }, 350);
}

function bubble(text, who) {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = `bubble bubble-${who}`;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chatArea');
  const d = document.createElement('div');
  d.className = 'bubble bubble-typing'; d.id = 'typing';
  d.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function speak(text) {
  if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.pitch = dog.pitch; u.rate = dog.rate;
  isTalking = true;
  u.onend = u.onerror = () => { isTalking = false; };
  synth.speak(u);
}

async function askClaude(msg) {
  showTyping();
  const msgs = [...history, {role:'user',content:msg}];
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:80,
        system: dog.persona,
        messages: msgs
      })
    });
    const data = await r.json();
    removeTyping();
    const reply = data.content?.[0]?.text?.trim() || 'Wouf !';
    history.push({role:'user',content:msg},{role:'assistant',content:reply});
    if (history.length > 14) history = history.slice(-14);
    bubble(reply,'dog');
    speak(reply);
  } catch(e) {
    removeTyping();
    const fb = 'Wouf ! Je t\'entends mal !';
    bubble(fb,'dog'); speak(fb);
  }
}

// Mic events
window.addEventListener('load', () => {
  const mb = document.getElementById('micBtn');
  mb.addEventListener('mousedown', startMic);
  mb.addEventListener('mouseup', stopMic);
  mb.addEventListener('mouseleave', stopMic);
  mb.addEventListener('touchstart', e=>{ e.preventDefault(); startMic(); }, {passive:false});
  mb.addEventListener('touchend',   e=>{ e.preventDefault(); stopMic();  }, {passive:false});
  mb.addEventListener('touchcancel',e=>{ e.preventDefault(); stopMic();  }, {passive:false});
  document.getElementById('hangupBtn').addEventListener('click', hangup);
});

function startMic() {
  if (isRec || isTalking) return;
  if (!SR) { setStatus('⚠️ Non supporté',false); return; }
  isRec = true;
  document.getElementById('micBtn').classList.add('recording');
  setStatus('👂 Écoute…', true);
  recog = new SR();
  recog.lang = 'fr-FR'; recog.interimResults = false; recog.maxAlternatives = 1;
  recog.onresult = ev => {
    const t = ev.results[0][0].transcript;
    bubble(t,'user');
    askClaude(t);
  };
  recog.onerror = () => resetMic();
  recog.onend   = () => resetMic();
  try { recog.start(); } catch(e) { resetMic(); }
}
function stopMic() {
  if (!isRec) return;
  try { recog?.stop(); } catch(e) {}
}
function resetMic() {
  isRec = false; recog = null;
  document.getElementById('micBtn')?.classList.remove('recording');
  setStatus('Maintiens\npour parler', false);
}
function setStatus(t, on) {
  const el = document.getElementById('mstatus');
  if (!el) return;
  el.textContent = t;
  el.className = 'mstatus' + (on ? ' on' : '');
}
function hangup() {
  synth.cancel(); stopMic(); clearInterval(timerIv);
  history = []; dog = null;
  showScreen('screen-select');
}
</script>
</body>
</html>
